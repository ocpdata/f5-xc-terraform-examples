name: "F5 XC WAF on CE AWS Destroy"

on:
  workflow_dispatch:

jobs:
  volt_mesh_site_destroy:
    name: "F5 XC WAF"
    runs-on: ubuntu-latest
    env:
      TF_VAR_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_xc_tenant: ${{ secrets.XC_TENANT }}
      TF_VAR_xc_namespace: ${{ vars.XC_NAMESPACE }}
      TF_VAR_app_domain: ${{ vars.APP_DOMAIN }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_aws: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_tf_cloud_workspace_eks: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      TF_VAR_tf_cloud_workspace_boutique: ${{ vars.TF_CLOUD_WORKSPACE_BOUTIQUE }}
      TF_VAR_aws_ce_site: "true"
      TF_VAR_ip_address_on_site_pool: "true"
      TF_VAR_serviceport: "30019"
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
    defaults:
      run:
        working-directory: ./waf-ce-k8s-aws/xc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform { 
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_XC }}"
              }
            }
          }
          EOF
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Remove stale Azure XC resources from state
        run: |
          terraform state rm 'volterra_tf_params_action.action_apply[0]' || true
          terraform state rm 'volterra_azure_vnet_site.azure_site[0]' || true
          terraform state rm 'volterra_cloud_credentials.azure_cred[0]' || true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Setup SSH Key
        id: ssh_setup
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          echo "pub_key=$(ssh-keygen -y -f /tmp/ssh_key)" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform plan -no-color -input=false

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Destroy
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform destroy -auto-approve -input=false

  terraform_boutique:
    name: "Boutique app"
    runs-on: ubuntu-latest
    needs: [volt_mesh_site_destroy]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_tf_cloud_workspace_infra: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_tf_cloud_workspace_eks: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      TF_VAR_tf_cloud_workspace_boutique: ${{ vars.TF_CLOUD_WORKSPACE_BOUTIQUE }}
    defaults:
      run:
        working-directory: ./waf-ce-k8s-aws/boutique
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_BOUTIQUE }}"
              }
            }
          }
          EOF
      - name: Terraform Init
        id: init
        run: terraform init

      - name: Remove kubectl resources from state
        run: |
          terraform state list 2>/dev/null | grep kubectl_manifest | xargs -r terraform state rm || true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Setup SSH Key
        id: ssh_setup
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          echo "pub_key=$(ssh-keygen -y -f /tmp/ssh_key)" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform plan -no-color -input=false

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Destroy
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform destroy -auto-approve -input=false

  terraform_eks_destroy:
    name: "AWS EKS"
    runs-on: ubuntu-latest
    needs: [volt_mesh_site_destroy, terraform_boutique]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_desired_size: "1"
      TF_VAR_min_size: "1"
      TF_VAR_max_size: "1"
      TF_VAR_skip_ha_az_node_group: "true"
      TF_VAR_skip_private_subnet_creation: "true"
    defaults:
      run:
        working-directory: ./waf-ce-k8s-aws/eks-cluster
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_EKS }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Setup SSH Key
        id: ssh_setup
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          echo "pub_key=$(ssh-keygen -y -f /tmp/ssh_key)" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform plan -no-color -input=false

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Destroy
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform destroy -auto-approve -input=false

  destorying_infra:
    needs: [volt_mesh_site_destroy, terraform_boutique, terraform_eks_destroy]
    name: "AWS Infra"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_azs: ${{ vars.AZS }}
    defaults:
      run:
        working-directory: ./waf-ce-k8s-aws/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_INFRA }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Setup SSH Key
        id: ssh_setup
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          echo "pub_key=$(ssh-keygen -y -f /tmp/ssh_key)" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform plan -no-color -input=false

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Destroy
        env:
          TF_VAR_ssh_key: ${{ steps.ssh_setup.outputs.pub_key }}
        run: terraform destroy -auto-approve -input=false