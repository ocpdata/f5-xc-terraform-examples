name: "Seguridad API en RE para EKS con CE - Destroy"

# Secrets requeridos: mismos que el apply workflow
# Variables requeridas: mismas que el apply workflow

on:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Job 1: Destroy F5 XC API Security (XC objects first)
  # -------------------------------------------------------
  terraform_xc:
    name: "Destroy F5XC API Security"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/xc
    env:
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_xc_tenant: ${{ secrets.XC_TENANT }}
      TF_VAR_xc_namespace: ${{ vars.XC_NAMESPACE }}
      TF_VAR_app_domain: ${{ vars.APP_DOMAIN }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_xc_p12_password: ${{ secrets.XC_P12_PASSWORD }}
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_VAR_aws: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      TF_VAR_eks_ce_site: "true"
      TF_VAR_k8s_pool: "true"
      TF_VAR_serviceName: "crapi-web.crapi"
      TF_VAR_serviceport: "80"
      TF_VAR_site_name: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_user_site: "true"
      TF_VAR_http_only: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend and P12
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_XC }}"
              }
            }
          }
          EOF
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

  # -------------------------------------------------------
  # Job 2: Destroy F5 XC CE on EKS
  # -------------------------------------------------------
  terraform_ce:
    name: "Destroy F5XC CE on AWS EKS"
    runs-on: ubuntu-latest
    needs: terraform_xc
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/eks-cluster/ce-deployment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_aws_waf_ce: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_CE }}"
              }
            }
          }
          EOF

      - name: Setup Configmap
        run: |
          cat > configmap.tf << EOF
          resource "kubectl_manifest" "configmap" {
              yaml_body = <<YAML
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: vpm-cfg
                namespace: ves-system
              data:
               config.yaml: |
                Vpm:
                  ClusterName: ${{ vars.PROJECT_PREFIX }}
                  ClusterType: ce
                  Config: /etc/vpm/config.yaml
                  DisableModules: ["recruiter"]
                  Latitude: ${{ vars.CE_LATITUDE }}
                  Longitude: ${{ vars.CE_LONGITUDE }}
                  MauriceEndpoint: https://register.ves.volterra.io
                  MauricePrivateEndpoint: https://register-tls.ves.volterra.io
                  PrivateNIC: eth0
                  SkipStages: ["osSetup", "etcd", "kubelet", "master", "voucher", "workload", "controlWorkload"]
                  Token: ${{ secrets.XC_CE_TOKEN }}
                  CertifiedHardware: k8s-minikube-voltmesh
              YAML
          }
          EOF

      - name: Terraform fmt
        run: terraform fmt

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

  # -------------------------------------------------------
  # Job 3: Destroy crAPI Application (Helm)
  # -------------------------------------------------------
  terraform_crapi:
    name: "Destroy crAPI App"
    runs-on: ubuntu-latest
    needs: terraform_ce
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/crapi-helm
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_infra_workspace: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_CRAPI }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

  # -------------------------------------------------------
  # Job 4: Destroy Amazon EKS Cluster
  # -------------------------------------------------------
  terraform_eks:
    name: "Destroy AWS EKS"
    runs-on: ubuntu-latest
    needs: terraform_crapi
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/eks-cluster
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH Public Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          SSH_PUB_KEY=$(ssh-keygen -y -f /tmp/ssh_key)
          rm -f /tmp/ssh_key
          echo "TF_VAR_ssh_key=$SSH_PUB_KEY" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_EKS }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

  # -------------------------------------------------------
  # Job 5: Destroy AWS Base Infrastructure
  # -------------------------------------------------------
  terraform_infra:
    name: "Destroy AWS Infra"
    runs-on: ubuntu-latest
    needs: terraform_eks
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_azs: ${{ vars.AZS }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_nap: "false"
      TF_VAR_nic: "false"
      TF_VAR_bigip: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH Public Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          SSH_PUB_KEY=$(ssh-keygen -y -f /tmp/ssh_key)
          rm -f /tmp/ssh_key
          echo "TF_VAR_ssh_key=$SSH_PUB_KEY" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_INFRA }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
