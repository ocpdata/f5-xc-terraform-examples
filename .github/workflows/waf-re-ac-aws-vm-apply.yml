name: "F5XC WAF on RE + AppConnect AWS Deploy"

on:
  workflow_dispatch:

jobs:

  terraform_infra:
    name: "AWS Infra"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./waf-re-ac-aws/infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_AWS_INFRA }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  terraform_vm:
    name: "AWS VM"
    runs-on: ubuntu-latest
    needs: terraform_infra
    outputs:
      vm_ip: ${{ steps.get_ip.outputs.vm_ip }}
    defaults:
      run:
        working-directory: ./waf-re-ac-aws/vm
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_tf_cloud_workspace_infra: ${{ vars.TF_CLOUD_WORKSPACE_AWS_INFRA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH public key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_private_key
          chmod 600 /tmp/ssh_private_key
          SSH_PUBLIC_KEY=$(ssh-keygen -y -f /tmp/ssh_private_key)
          rm -f /tmp/ssh_private_key
          echo "TF_VAR_ssh_key=${SSH_PUBLIC_KEY}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_AWS_VM }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Get DVWA private IP
        id: get_ip
        run: echo "vm_ip=$(terraform output -raw vm_ip)" >> $GITHUB_OUTPUT

  terraform_xc:
    name: "F5XC WAF"
    runs-on: ubuntu-latest
    needs: terraform_vm
    defaults:
      run:
        working-directory: ./xc
    env:
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_aws: ${{ vars.TF_CLOUD_WORKSPACE_AWS_INFRA }}
      TF_VAR_xc_tenant: ${{ secrets.XC_TENANT }}
      TF_VAR_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_xc_namespace: ${{ vars.XC_NAMESPACE }}
      TF_VAR_app_domain: ${{ vars.APP_DOMAIN }}
      TF_VAR_serviceName: ${{ needs.terraform_vm.outputs.vm_ip }}
      TF_VAR_serviceport: "8080"
      VOLT_API_P12_FILE: api.p12
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH public key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_private_key
          chmod 600 /tmp/ssh_private_key
          SSH_PUBLIC_KEY=$(ssh-keygen -y -f /tmp/ssh_private_key)
          rm -f /tmp/ssh_private_key
          echo "TF_VAR_ssh_key=${SSH_PUBLIC_KEY}" >> $GITHUB_ENV

      - name: Create XC namespace if not exists
        run: |
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > /tmp/api.p12
          TOKEN=$(curl -sf --cert-type P12 --cert /tmp/api.p12:${{ secrets.XC_P12_PASSWORD }} \
            "${{ secrets.XC_API_URL }}/api/identity/v3/token" \
            -H "Content-Type: application/json" \
            -d '{"type":"API_TOKEN"}' | jq -r '.token')
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: APIToken ${TOKEN}" \
            "${{ secrets.XC_API_URL }}/api/web/namespaces/${{ vars.XC_NAMESPACE }}")
          if [ "$STATUS" = "404" ]; then
            curl -sf -X POST \
              -H "Authorization: APIToken ${TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ secrets.XC_API_URL }}/api/web/namespaces" \
              -d "{\"metadata\":{\"name\":\"${{ vars.XC_NAMESPACE }}\"},\"spec\":{}}"
            echo "Namespace ${{ vars.XC_NAMESPACE }} created."
          else
            echo "Namespace ${{ vars.XC_NAMESPACE }} already exists."
          fi
          rm -f /tmp/api.p12

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_AWS_XC }}"
              }
            }
          }
          EOF
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
