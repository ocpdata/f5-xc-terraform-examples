name: "Seguridad API en RE para EKS con CE"

# Secrets (Settings > Secrets and variables > Actions > Secrets):
#   TF_API_TOKEN            - Terraform Cloud user token
#   TF_CLOUD_ORGANIZATION   - Terraform Cloud organization name
#   AWS_ACCESS_KEY          - AWS Access Key ID
#   AWS_SECRET_KEY          - AWS Secret Access Key
#   SSH_PRIVATE_KEY         - SSH private key (RSA) for EC2/EKS node access
#   XC_API_P12_FILE         - F5 XC API certificate (.p12) encoded in base64
#   XC_API_URL              - F5 XC tenant API URL
#   XC_P12_PASSWORD         - Password for the .p12 certificate
#   XC_TENANT               - F5 XC tenant name
#   XC_CE_TOKEN             - F5 XC CE pre-registration token
#
# Variables (Settings > Secrets and variables > Actions > Variables):
#   PROJECT_PREFIX              - Prefix for resource names
#   AWS_REGION                  - AWS region (e.g. us-east-1)
#   TF_CLOUD_WORKSPACE_INFRA    - TF Cloud workspace for AWS base infra
#   TF_CLOUD_WORKSPACE_EKS      - TF Cloud workspace for EKS cluster
#   TF_CLOUD_WORKSPACE_CRAPI    - TF Cloud workspace for crAPI app
#   TF_CLOUD_WORKSPACE_CE       - TF Cloud workspace for F5 XC CE deployment
#   TF_CLOUD_WORKSPACE_XC       - TF Cloud workspace for F5 XC API Security
#   CE_LATITUDE                 - Latitude for CE site registration
#   CE_LONGITUDE                - Longitude for CE site registration
#   AZS                         - AWS Availability Zones as JSON list (e.g. ["us-east-1a","us-east-1b"])
#   XC_NAMESPACE                - F5 XC namespace for app objects
#   APP_DOMAIN                  - FQDN for the app (e.g. app.prod.example.com)

on:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Job 0: Setup Terraform Cloud Workspaces + Remote State Sharing
  # -------------------------------------------------------
  setup_tfc_workspaces:
    name: "Setup TFC Workspaces"
    runs-on: ubuntu-latest
    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TF_ORG: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      WS_INFRA: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      WS_EKS: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      WS_CRAPI: ${{ vars.TF_CLOUD_WORKSPACE_CRAPI }}
      WS_CE: ${{ vars.TF_CLOUD_WORKSPACE_CE }}
      WS_XC: ${{ vars.TF_CLOUD_WORKSPACE_XC }}
    steps:
      - name: Create workspaces and configure Remote State Sharing
        run: |
          TFC_API="https://app.terraform.io/api/v2"
          AUTH="Authorization: Bearer ${TF_API_TOKEN}"
          CT="Content-Type: application/vnd.api+json"

          create_or_update_workspace() {
            local ws_name=$1
            existing=$(curl -sf \
              --header "${AUTH}" \
              "${TFC_API}/organizations/${TF_ORG}/workspaces/${ws_name}" || true)
            if [ -n "${existing}" ]; then
              echo "Workspace '${ws_name}' already exists — ensuring execution-mode=local" >&2
              ws_id=$(echo "${existing}" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
              curl -sf \
                --header "${AUTH}" --header "${CT}" \
                --request PATCH \
                --data "{\"data\":{\"type\":\"workspaces\",\"attributes\":{\"execution-mode\":\"local\"}}}" \
                "${TFC_API}/workspaces/${ws_id}" > /dev/null
            else
              echo "Creating workspace '${ws_name}'" >&2
              response=$(curl -sf \
                --header "${AUTH}" --header "${CT}" \
                --request POST \
                --data "{\"data\":{\"type\":\"workspaces\",\"attributes\":{\"name\":\"${ws_name}\",\"execution-mode\":\"local\",\"global-remote-state\":false}}}" \
                "${TFC_API}/organizations/${TF_ORG}/workspaces")
              ws_id=$(echo "${response}" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
            fi
            echo "${ws_id}"
          }

          add_remote_state_consumer() {
            local producer_id=$1
            local consumer_id=$2
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              --header "${AUTH}" --header "${CT}" \
              --request POST \
              --data "{\"data\":[{\"id\":\"${consumer_id}\",\"type\":\"workspaces\"}]}" \
              "${TFC_API}/workspaces/${producer_id}/relationships/remote-state-consumers")
            if [ "${http_code}" = "204" ] || [ "${http_code}" = "422" ]; then
              echo "  remote-state-consumer ok (${http_code})"
            else
              echo "  ERROR adding remote-state-consumer: HTTP ${http_code}" && exit 1
            fi
          }

          echo "=== Creating / updating workspaces ==="
          ID_INFRA=$(create_or_update_workspace "${WS_INFRA}")
          echo "  INFRA  -> ${ID_INFRA}"
          ID_EKS=$(create_or_update_workspace "${WS_EKS}")
          echo "  EKS    -> ${ID_EKS}"
          ID_CRAPI=$(create_or_update_workspace "${WS_CRAPI}")
          echo "  CRAPI  -> ${ID_CRAPI}"
          ID_CE=$(create_or_update_workspace "${WS_CE}")
          echo "  CE     -> ${ID_CE}"
          ID_XC=$(create_or_update_workspace "${WS_XC}")
          echo "  XC     -> ${ID_XC}"

          echo "=== Configuring Remote State Sharing ==="
          echo "INFRA -> EKS:";   add_remote_state_consumer "${ID_INFRA}" "${ID_EKS}"
          echo "INFRA -> CRAPI:"; add_remote_state_consumer "${ID_INFRA}" "${ID_CRAPI}"
          echo "INFRA -> CE:";    add_remote_state_consumer "${ID_INFRA}" "${ID_CE}"
          echo "INFRA -> XC:";    add_remote_state_consumer "${ID_INFRA}" "${ID_XC}"
          echo "EKS -> CRAPI:";   add_remote_state_consumer "${ID_EKS}" "${ID_CRAPI}"
          echo "EKS -> CE:";      add_remote_state_consumer "${ID_EKS}" "${ID_CE}"
          echo "EKS -> XC:";      add_remote_state_consumer "${ID_EKS}" "${ID_XC}"

  # -------------------------------------------------------
  # Job 1: AWS Base Infrastructure
  # -------------------------------------------------------
  terraform_infra:
    name: "AWS Infra"
    runs-on: ubuntu-latest
    needs: setup_tfc_workspaces
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_azs: ${{ vars.AZS }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_nap: "false"
      TF_VAR_nic: "false"
      TF_VAR_bigip: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH Public Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          SSH_PUB_KEY=$(ssh-keygen -y -f /tmp/ssh_key)
          rm -f /tmp/ssh_key
          echo "TF_VAR_ssh_key=$SSH_PUB_KEY" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_INFRA }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 2: Amazon EKS Cluster
  # -------------------------------------------------------
  terraform_eks:
    name: "AWS EKS"
    runs-on: ubuntu-latest
    needs: terraform_infra
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/eks-cluster
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive SSH Public Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          SSH_PUB_KEY=$(ssh-keygen -y -f /tmp/ssh_key)
          rm -f /tmp/ssh_key
          echo "TF_VAR_ssh_key=$SSH_PUB_KEY" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_EKS }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 3: crAPI Application (Helm)
  # -------------------------------------------------------
  terraform_crapi:
    name: "crAPI App"
    runs-on: ubuntu-latest
    needs: terraform_eks
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/crapi-helm
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_infra_workspace: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_CRAPI }}"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 4: F5 XC Customer Edge on EKS
  # -------------------------------------------------------
  terraform_ce:
    name: "F5XC CE on AWS EKS"
    runs-on: ubuntu-latest
    needs: terraform_crapi
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/eks-cluster/ce-deployment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_aws_waf_ce: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_CE }}"
              }
            }
          }
          EOF

      - name: Setup Configmap
        id: configmap
        run: |
          cat > configmap.tf << EOF
          resource "kubectl_manifest" "configmap" {
              yaml_body = <<YAML
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: vpm-cfg
                namespace: ves-system
              data:
               config.yaml: |
                Vpm:
                  ClusterName: ${{ vars.PROJECT_PREFIX }}
                  ClusterType: ce
                  Config: /etc/vpm/config.yaml
                  DisableModules: ["recruiter"]
                  Latitude: ${{ vars.CE_LATITUDE }}
                  Longitude: ${{ vars.CE_LONGITUDE }}
                  MauriceEndpoint: https://register.ves.volterra.io
                  MauricePrivateEndpoint: https://register-tls.ves.volterra.io
                  PrivateNIC: eth0
                  SkipStages: ["osSetup", "etcd", "kubelet", "master", "voucher", "workload", "controlWorkload"]
                  Token: ${{ secrets.XC_CE_TOKEN }}
                  CertifiedHardware: k8s-minikube-voltmesh
              YAML
          }
          EOF

      - name: Terraform fmt
        id: format
        run: |
          terraform fmt
          cat configmap.tf

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  # -------------------------------------------------------
  # Job 5: F5 XC API Security Configuration
  # -------------------------------------------------------
  terraform_xc:
    name: "F5XC API Security"
    runs-on: ubuntu-latest
    needs: terraform_ce
    defaults:
      run:
        working-directory: ./f5xc-api-ce-eks/xc
    env:
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_xc_tenant: ${{ secrets.XC_TENANT }}
      TF_VAR_xc_namespace: ${{ vars.XC_NAMESPACE }}
      TF_VAR_app_domain: ${{ vars.APP_DOMAIN }}
      TF_VAR_tf_cloud_organization: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_VAR_xc_p12_password: ${{ secrets.XC_P12_PASSWORD }}
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      # Infra and EKS workspace names (parametrized remote state reads)
      TF_VAR_aws: ${{ vars.TF_CLOUD_WORKSPACE_INFRA }}
      TF_VAR_eks_workspace: ${{ vars.TF_CLOUD_WORKSPACE_EKS }}
      # EKS CE site origin pool via k8s service
      TF_VAR_eks_ce_site: "true"
      TF_VAR_k8s_pool: "true"
      TF_VAR_serviceName: "crapi-web.crapi"
      TF_VAR_serviceport: "80"
      TF_VAR_site_name: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_user_site: "true"
      TF_VAR_http_only: "true"
      TF_VAR_xc_api_disc: "true"
      TF_VAR_xc_api_pro: "true"
      TF_VAR_xc_api_val: "true"
      TF_VAR_xc_api_val_all: "true"
      TF_VAR_xc_api_val_active: "true"
      TF_VAR_enforcement_block: "false"
      TF_VAR_enforcement_report: "true"
      TF_VAR_fall_through_mode_allow: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "${{ vars.TF_CLOUD_WORKSPACE_XC }}"
              }
            }
          }
          EOF
          echo "${{ secrets.XC_API_P12_FILE }}" | base64 -d > api.p12

      - name: Wait for CE to register with F5 XC
        run: |
          echo "Waiting 12 minutes for CE pod to boot and register with F5 XC..."
          sleep 720

      - name: Upload crAPI OAS spec to XC Object Store
        id: upload_spec
        run: |
          # Extract cert and key from P12
          openssl pkcs12 -in api.p12 -nocerts -nodes -out api.key \
            -legacy -passin pass:"${{ secrets.XC_P12_PASSWORD }}" 2>/dev/null
          openssl pkcs12 -in api.p12 -clcerts -nokeys -out api.crt \
            -legacy -passin pass:"${{ secrets.XC_P12_PASSWORD }}" 2>/dev/null

          # Download crAPI spec
          curl -sL https://raw.githubusercontent.com/OWASP/crAPI/develop/openapi-spec/crapi-openapi-spec.json \
            -o crapi-spec.json

          NAMESPACE="${{ vars.XC_NAMESPACE }}"
          # Build API base from tenant name (XC_API_URL format: https://<tenant>.console.ves.voltera.io/...)
          API_BASE="https://${{ secrets.XC_TENANT }}.console.ves.voltera.io"
          SPEC_NAME="crapi-spec"
          SPEC_ENDPOINT="${API_BASE}/api/object_store/namespaces/${NAMESPACE}/stored_objects/swagger"

          # Check if spec already exists
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
            --cert api.crt --key api.key \
            "${SPEC_ENDPOINT}/${SPEC_NAME}")

          if [ "${http_code}" = "200" ]; then
            echo "Spec '${SPEC_NAME}' already exists in XC Object Store" >&2
          else
            echo "Uploading crAPI spec to XC Object Store (HTTP ${http_code})..." >&2
            BODY=$(python3 -c "
import json
content = open('crapi-spec.json').read()
print(json.dumps({
  'metadata': {'name': '${SPEC_NAME}', 'namespace': '${NAMESPACE}'},
  'spec': {'contents': content}
}))
")
            response=$(curl -s -w "\n%{http_code}" -X POST \
              --cert api.crt --key api.key \
              -H "Content-Type: application/json" \
              "${SPEC_ENDPOINT}" \
              -d "${BODY}")
            resp_code=$(echo "${response}" | tail -1)
            resp_body=$(echo "${response}" | head -1)
            echo "Upload response HTTP ${resp_code}: ${resp_body}" >&2
            if [ "${resp_code}" != "200" ] && [ "${resp_code}" != "201" ]; then
              echo "ERROR: Failed to upload spec (HTTP ${resp_code})" >&2
              exit 1
            fi
          fi

          # Get latest version URL
          SPEC_DATA=$(curl -sf \
            --cert api.crt --key api.key \
            "${SPEC_ENDPOINT}/${SPEC_NAME}")
          SPEC_URL=$(echo "${SPEC_DATA}" | python3 -c "
import sys, json
data = json.load(sys.stdin)
versions = data.get('spec', {}).get('all_versions', [])
latest = sorted(versions)[-1] if versions else 'v1'
ns = '${NAMESPACE}'
base = '${API_BASE}'
name = '${SPEC_NAME}'
print(f'{base}/api/object_store/namespaces/{ns}/stored_objects/swagger/{name}/{latest}')
")
          echo "SPEC_URL=${SPEC_URL}" >> $GITHUB_OUTPUT
          echo "spec_url=${SPEC_URL}" >&2

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var='xc_api_spec=["${{ steps.upload_spec.outputs.SPEC_URL }}"]'
